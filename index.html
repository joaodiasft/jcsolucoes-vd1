<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://wthdtoucdvlmsyvtbxul.supabase.co; base-uri 'self'; form-action 'self';">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>JC Soluções — Entrar</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/jcpag-theme.css?v=12">
</head>
<body class="jcpag-body">

  <div class="jcpag-login-page">
    <div class="jcpag-login-card">
      <div class="jcpag-login-logo">
        <i class="ph-fill ph-lock-key"></i>
      </div>
      <h1 class="jcpag-login-title">JC Soluções</h1>
      <p class="jcpag-login-sub">Digite seu token de acesso</p>

      <form id="login-form" class="jcpag-form-stack" autocomplete="off">
        <div>
          <label class="jcpag-label" for="token">Token</label>
          <input required type="password" id="token" maxlength="64" autocomplete="off"
            class="jcpag-input" placeholder="••••••••">
        </div>
        <p id="login-erro" class="jcpag-erro hidden"></p>
        <button type="submit" id="btn-login" class="jcpag-btn-primary">
          <span id="btn-text">Entrar</span>
        </button>
      </form>

      <p class="jcpag-footnote">Problemas no acesso? Entre em contato com a JC Soluções.</p>
    </div>
  </div>

  <script src="config.example.js?v=12"></script>
  <script src="config.local.js?v=12"></script>
  <script src="js/security/crypto.js?v=12"></script>
  <script src="js/security/auth.js?v=12"></script>
  <script src="js/security/guard.js?v=12"></script>
  <script src="js/core/store.js?v=12"></script>
  <script src="js/core/dados.js?v=12"></script>
  <script src="js/app/login.js?v=12"></script>
</body>
</html>
